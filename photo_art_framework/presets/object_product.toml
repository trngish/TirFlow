# 产品展示 LoRA 预设
# 适用场景：训练特定产品的外观特征，用于产品图生成
# 推荐训练图片数：10-15张
# 预计训练时间：约 1-2 小时

[general]
enable_bucket = true
mixed_precision = "bf16"
gradient_checkpointing = true
xformers = true

[model]
pretrained_model_name_or_path = "d:\\TirFlow\\models\\sd_xl_base_1.0.safetensors"

[datasets]
train_data_dir = "d:\\TirFlow\\train_data"
resolution = "1024,1024"
batch_size = 1
cache_latents = true
enable_bucket = true
max_token_length = 225
color_aug = false
flip_aug = true
random_crop = false

[network]
network_module = "networks.lora"
network_dim = 32
network_alpha = 16
network_args = []

[training]
learning_rate = 5e-5
text_encoder_lr = 5e-5
unet_lr = 5e-5
lr_scheduler = "cosine"
lr_warmup_steps = 100
max_train_steps = 2500
save_model_as = "safetensors"
gradient_accumulation_steps = 4
optimizer_type = "AdamW8bit"
noise_offset = 0.03
keep_tokens = 1

[saving]
output_dir = "d:\\TirFlow\\output_lora"
output_name = "product_lora"
save_every_n_steps = 250
save_precision = "bf16"

[sample]
sample_every_n_steps = 250
sample_prompts = "trigger_word, product photography, studio lighting, clean background, professional, 8k"
sample_sampler = "euler_a"
sample_steps = 25
