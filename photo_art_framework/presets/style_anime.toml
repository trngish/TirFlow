# 动漫画风 LoRA 预设
# 适用场景：训练动漫风格的绘画特征，包括线条、色彩、构图等
# 推荐训练图片数：30-50张
# 预计训练时间：约 4-5 小时

[general]
enable_bucket = true
mixed_precision = "bf16"
gradient_checkpointing = true
xformers = true

[model]
pretrained_model_name_or_path = "d:\\TirFlow\\models\\sd_xl_base_1.0.safetensors"

[datasets]
train_data_dir = "d:\\TirFlow\\train_data"
resolution = "1024,1024"
batch_size = 1
cache_latents = true
enable_bucket = true
max_token_length = 225
color_aug = true
flip_aug = true
random_crop = false

[network]
network_module = "networks.lora"
network_dim = 64
network_alpha = 32
network_args = []

[training]
learning_rate = 1e-4
text_encoder_lr = 5e-5
unet_lr = 1e-4
lr_scheduler = "cosine"
lr_warmup_steps = 300
max_train_steps = 5000
save_model_as = "safetensors"
gradient_accumulation_steps = 4
optimizer_type = "AdamW8bit"
noise_offset = 0.1
keep_tokens = 1

[saving]
output_dir = "d:\\TirFlow\\output_lora"
output_name = "anime_style_lora"
save_every_n_steps = 500
save_precision = "bf16"

[sample]
sample_every_n_steps = 500
sample_prompts = "trigger_word, anime style, illustration, vibrant colors, detailed anime art, masterpiece"
sample_sampler = "euler_a"
sample_steps = 25
